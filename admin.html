<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>게임최적화 - 관리자 페이지</title>
  <link rel="stylesheet" href="/admin/css/admin.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div id="adminApp" class="admin-app">
    <!-- 사이드바 -->
    <aside class="admin-sidebar">
      <div class="sidebar-header">
        <h1>🎮 관리자</h1>
      </div>
      <nav class="sidebar-nav">
        <button class="nav-item" data-view="dashboard" onclick="showView('dashboard')">
          📊 대시보드
        </button>
        <button class="nav-item" data-view="orders" onclick="showView('orders')">
          📦 주문관리
        </button>
        <button class="nav-item" data-view="coupons" onclick="showView('coupons')">
          🎟️ 쿠폰관리
        </button>
        <button class="nav-item" data-view="customers" onclick="showView('customers')">
          👥 고객조회
        </button>
      </nav>
      <div class="sidebar-footer">
        <button class="btn-logout" onclick="handleLogout()">로그아웃</button>
      </div>
    </aside>

    <!-- 메인 콘텐츠 -->
    <main class="admin-main">
      <!-- 로그인 뷰 -->
      <div id="view-login" class="admin-view">
        <div class="login-card">
          <h2>관리자 로그인</h2>
          <form onsubmit="handleLogin(event)">
            <div class="form-group">
              <label>이메일</label>
              <input type="email" id="loginEmail" placeholder="admin@example.com" required>
            </div>
            <div class="form-group">
              <label>비밀번호</label>
              <input type="password" id="loginPassword" placeholder="비밀번호" required>
            </div>
            <button type="submit" class="btn-primary" style="width: 100%;">로그인</button>
          </form>
          <div id="loginError" class="error-msg"></div>
        </div>
      </div>

      <!-- 대시보드 뷰 -->
      <div id="view-dashboard" class="admin-view" style="display: none;">
        <h2>대시보드</h2>
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-label">총 매출</div>
            <div class="stat-value" id="statTotalRevenue">₩0</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">총 주문</div>
            <div class="stat-value" id="statTotalOrders">0</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">진행중</div>
            <div class="stat-value" id="statPending">0</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">완료</div>
            <div class="stat-value" id="statDone">0</div>
          </div>
        </div>
        <div class="admin-card" style="margin-top: 30px;">
          <h3>최근 주문 (5건)</h3>
          <div id="recentOrdersList" class="orders-list"></div>
        </div>
      </div>

      <!-- 주문관리 뷰 -->
      <div id="view-orders" class="admin-view" style="display: none;">
        <h2>주문관리</h2>
        <div class="order-filters">
          <select id="orderStatusFilter" onchange="loadOrders()">
            <option value="">전체 상태</option>
            <option value="pending">대기</option>
            <option value="working">작업중</option>
            <option value="done">완료</option>
            <option value="refunded">환불</option>
            <option value="cancelled">취소</option>
          </select>
          <input type="text" id="orderSearchInput" placeholder="이름, 연락처, 주문번호 검색" onkeyup="loadOrders()">
        </div>
        <div id="ordersList" class="admin-table-wrapper"></div>
      </div>

      <!-- 쿠폰관리 뷰 -->
      <div id="view-coupons" class="admin-view" style="display: none;">
        <h2>쿠폰관리</h2>
        <button class="btn-primary" onclick="openCouponModal()" style="margin-bottom: 20px;">+ 새 쿠폰</button>
        <div id="couponsList" class="admin-table-wrapper"></div>
      </div>

      <!-- 고객조회 뷰 -->
      <div id="view-customers" class="admin-view" style="display: none;">
        <h2>고객조회</h2>
        <input type="text" id="customerSearchInput" placeholder="이름, 카카오ID 검색" onkeyup="loadCustomers()" style="margin-bottom: 20px; padding: 10px; width: 100%; box-sizing: border-box;">
        <div id="customersList" class="admin-table-wrapper"></div>
      </div>
    </main>
  </div>

  <!-- 모달: 주문 상세 -->
  <div id="orderDetailModal" class="modal-backdrop">
    <div class="modal-content">
      <div class="modal-header">
        <h3>주문 상세</h3>
        <button class="modal-close" onclick="document.getElementById('orderDetailModal').style.display='none'">×</button>
      </div>
      <div id="orderDetailBody" class="modal-body"></div>
    </div>
  </div>

  <!-- 모달: 쿠폰 편집 -->
  <div id="couponModal" class="modal-backdrop">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="couponModalTitle">쿠폰 추가</h3>
        <button class="modal-close" onclick="document.getElementById('couponModal').style.display='none'">×</button>
      </div>
      <form id="couponForm" class="modal-body" onsubmit="saveCoupon(event)">
        <div class="form-group">
          <label>쿠폰 코드</label>
          <input type="text" id="couponCode" placeholder="예: GAMEBOOST10" required>
        </div>
        <div class="form-group">
          <label>유형</label>
          <select id="couponType" onchange="toggleCouponValue()">
            <option value="percent">할인율 (%)</option>
            <option value="fixed">고정액 (₩)</option>
          </select>
        </div>
        <div class="form-group">
          <label id="couponValueLabel">할인값 (%)</label>
          <input type="number" id="couponValue" placeholder="10" required>
        </div>
        <div class="form-group">
          <label>라벨</label>
          <input type="text" id="couponLabel" placeholder="예: 10% 할인" required>
        </div>
        <div class="form-group">
          <label>최대 사용 횟수 (비워두면 무제한)</label>
          <input type="number" id="couponMaxUses" placeholder="무제한">
        </div>
        <div class="form-group">
          <label>만료일 (선택사항)</label>
          <input type="date" id="couponExpires">
        </div>
        <button type="submit" class="btn-primary" style="width: 100%;">저장</button>
      </form>
    </div>
  </div>

  <!-- 토스트 알림 -->
  <div id="toastContainer" class="toast-container"></div>

  <script src="/admin/js/admin.js"></script>
</body>
</html>
