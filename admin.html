<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GameBoost Pro - 관리자 대시보드</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="stylesheet" href="/css/admin.css" />
</head>
<body>
  <div class="admin-container">
    <!-- SIDEBAR -->
    <aside class="admin-sidebar">
      <div class="admin-header">
        <span style="font-size:1.2rem;font-weight:800;color:var(--primary);">🎮</span>
        <span style="font-size:.9rem;font-weight:700;margin-left:8px;">관리자</span>
      </div>
      <nav class="admin-nav">
        <button class="admin-nav-btn active" onclick="switchTab('dashboard')">📊 대시보드</button>
        <button class="admin-nav-btn" onclick="switchTab('orders')">📦 주문관리</button>
        <button class="admin-nav-btn" onclick="switchTab('coupons')">🎟️ 쿠폰관리</button>
        <button class="admin-nav-btn" onclick="switchTab('customers')">👥 고객조회</button>
      </nav>
      <button class="admin-logout" onclick="goHome()">🏠 돌아가기</button>
    </aside>

    <!-- MAIN -->
    <main class="admin-main">
      <!-- DASHBOARD TAB -->
      <section id="dashboard-tab" class="admin-tab active">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:32px;">
          <h1 style="margin:0;">대시보드</h1>
          <div style="font-size:.9rem;color:var(--text-muted);">최근 업데이트: <span id="currentTime">--:--:--</span></div>
        </div>
        <div class="admin-stats">
          <div class="stat-card">
            <div class="stat-label">총 매출</div>
            <div class="stat-value" id="totalRevenue">₩0</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">총 주문</div>
            <div class="stat-value" id="totalOrders">0</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">진행중</div>
            <div class="stat-value" id="pendingOrders">0</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">완료</div>
            <div class="stat-value" id="completedOrders">0</div>
          </div>
        </div>

        <h2 style="margin-top:40px;margin-bottom:20px;">최근 주문</h2>
        <div class="admin-table-wrap">
          <table class="admin-table">
            <thead>
              <tr>
                <th>주문번호</th>
                <th>고객명</th>
                <th>상품</th>
                <th>금액</th>
                <th>상태</th>
                <th>날짜</th>
              </tr>
            </thead>
            <tbody id="recentOrdersTable">
              <tr><td colspan="6" style="text-align:center;color:var(--text-muted);">주문이 없습니다.</td></tr>
            </tbody>
          </table>
        </div>
      </section>

      <!-- ORDERS TAB -->
      <section id="orders-tab" class="admin-tab">
        <h1>주문관리</h1>
        <div class="admin-filters">
          <select id="statusFilter" onchange="filterOrders()">
            <option value="">전체 상태</option>
            <option value="pending">진행중</option>
            <option value="completed">완료</option>
            <option value="cancelled">취소</option>
          </select>
        </div>
        <div class="admin-table-wrap">
          <table class="admin-table">
            <thead>
              <tr>
                <th>주문번호</th>
                <th>고객명</th>
                <th>상품</th>
                <th>금액</th>
                <th>상태</th>
                <th>액션</th>
              </tr>
            </thead>
            <tbody id="allOrdersTable">
              <tr><td colspan="6" style="text-align:center;color:var(--text-muted);">주문이 없습니다.</td></tr>
            </tbody>
          </table>
        </div>
      </section>

      <!-- COUPONS TAB -->
      <section id="coupons-tab" class="admin-tab">
        <h1>쿠폰관리</h1>
        <div class="admin-table-wrap">
          <table class="admin-table">
            <thead>
              <tr>
                <th>쿠폰코드</th>
                <th>할인율/금액</th>
                <th>사용횟수</th>
                <th>최대한도</th>
              </tr>
            </thead>
            <tbody id="couponsTable">
              <tr><td colspan="4" style="text-align:center;color:var(--text-muted);">쿠폰이 없습니다.</td></tr>
            </tbody>
          </table>
        </div>
      </section>

      <!-- CUSTOMERS TAB -->
      <section id="customers-tab" class="admin-tab">
        <h1>고객조회</h1>
        <div class="admin-table-wrap">
          <table class="admin-table">
            <thead>
              <tr>
                <th>고객명</th>
                <th>연락처</th>
                <th>주문수</th>
                <th>총 구매액</th>
              </tr>
            </thead>
            <tbody id="customersTable">
              <tr><td colspan="4" style="text-align:center;color:var(--text-muted);">고객이 없습니다.</td></tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <script src="/js/admin.js"></script>
</body>
</html>
